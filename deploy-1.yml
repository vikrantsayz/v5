# ╔══════════════════════════════════════════════════════════════════════╗
# ║  𝐕ɪᴋʀᴀɴᴛ ⚡  GitHub Actions — Auto Deploy to GitHub Pages           ║
# ║                                                                      ║
# ║  SETUP:                                                              ║
# ║  1. GitHub repo → Settings → Pages → Source: GitHub Actions         ║
# ║  2. Settings → Secrets and Variables → Actions → New secret:        ║
# ║     VIKRANT_GROQ_KEY   = gsk_xxxx...                                ║
# ║     VIKRANT_OR_KEY     = sk-or-xxxx... (optional)                   ║
# ║     VIKRANT_HF_TOKEN   = hf_xxxx... (optional)                      ║
# ║     VIKRANT_TG_TOKEN   = 1234567:AAHfxxx...                         ║
# ║     VIKRANT_TG_ADMIN   = 987654321                                  ║
# ║     VIKRANT_ADMIN_PASS = yourStrongPassword123                       ║
# ║  3. Push any commit → auto deploy hoga!                              ║
# ╚══════════════════════════════════════════════════════════════════════╝

name: 🚀 Deploy Vikrant Pro

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:           # Manual trigger bhi allowed

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🔑 Generate config.js from Secrets
        run: |
          cp config.template.js config.js

          # Replace each placeholder with actual secret value
          sed -i "s|__VIKRANT_GROQ_KEY__|${{ secrets.VIKRANT_GROQ_KEY }}|g"   config.js
          sed -i "s|__VIKRANT_OR_KEY__|${{ secrets.VIKRANT_OR_KEY }}|g"        config.js
          sed -i "s|__VIKRANT_HF_TOKEN__|${{ secrets.VIKRANT_HF_TOKEN }}|g"   config.js
          sed -i "s|__VIKRANT_TG_TOKEN__|${{ secrets.VIKRANT_TG_TOKEN }}|g"   config.js
          sed -i "s|__VIKRANT_TG_ADMIN__|${{ secrets.VIKRANT_TG_ADMIN }}|g"   config.js
          sed -i "s|__VIKRANT_ADMIN_PASS__|${{ secrets.VIKRANT_ADMIN_PASS }}|g" config.js

          echo "✅ config.js generated successfully"

      - name: 🧹 Remove template & sensitive files from deploy
        run: |
          rm -f config.template.js
          rm -f .gitignore
          # Build folder = current dir without .github
          mkdir -p _site
          cp vikrant-pro.html _site/index.html
          cp config.js _site/config.js

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: 🌐 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
